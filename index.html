<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepSeek V4 Graph Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="graph-shell" aria-label="DeepSeek V4 graph canvas">
        <section class="canvas-card">
          <div class="mode-picker" aria-label="graph view controls">
            <span>Layer mode</span>
            <button class="active" data-layer-preset="0" title="Layers 0-1 use HCA, R=128">L0-1 HCA</button>
            <button data-layer-preset="2" title="Even decoder layers use CSA-like compressed selection, R=4">L2,4...60 CSA</button>
            <button data-layer-preset="3" title="Odd decoder layers use HCA, R=128">L3,5...59 HCA</button>
            <button data-layer-preset="61" title="MTP path uses sliding-window attention, R=0">MTP SWA</button>
            <i aria-hidden="true"></i>
            <span>Group</span>
            <button class="active" data-scene-select="overview" title="Show the full graph">전체</button>
            <button data-scene-select="mhc" title="Show mHC controller and data paths">mHC</button>
            <button data-scene-select="attention" title="Show attention internals">Attention</button>
            <button data-scene-select="compression" title="Show cache and compression internals">Cache</button>
            <button data-scene-select="indexer" title="Show Lightning indexer">Indexer</button>
            <button data-scene-select="moe" title="Show MoE routing and experts">MoE</button>
            <button data-scene-select="output" title="Show output head and MTP">Output</button>
          </div>
          <div class="zoom-actions" aria-label="graph zoom controls">
            <button id="zoomOut" title="Zoom out" aria-label="Zoom out">-</button>
            <button id="zoomFit" title="Fit graph" aria-label="Fit graph">Fit</button>
            <button id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
          </div>

          <svg id="graph" viewBox="0 0 1280 1280" role="img" aria-label="DeepSeek V4 top to bottom tensor graph">
            <defs>
              <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                <path d="M0,0 L0,6 L9,3 z" fill="currentColor"></path>
              </marker>
              <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
                <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1d2a2f" flood-opacity="0.14" />
              </filter>
              <linearGradient id="canvasWash" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#fffdf7" />
                <stop offset="1" stop-color="#f7f1e4" />
              </linearGradient>
            </defs>
            <g id="zoomLayer">
              <g id="groupLayer"></g>
              <g id="edgeLayer"></g>
              <g id="nodeLayer"></g>
            </g>
          </svg>
        </section>

        <aside class="info-panel" aria-label="selected node information">
          <p id="detailCategory" class="pill">stream</p>
          <h2 id="detailTitle">Input IDs</h2>
          <div id="detailCards" class="detail-cards"></div>
          <div class="detail-shapes">
            <div>
              <span>Input</span>
              <code id="inputShape"></code>
            </div>
            <div>
              <span>Output</span>
              <code id="outputShape"></code>
            </div>
          </div>
          <dl id="paramList" class="param-list"></dl>
          <ul id="noteList" class="note-list"></ul>
          <div id="sourceList" class="source-list"></div>
          <button id="drillButton" class="drill-button" hidden>Open subgraph</button>
        </aside>
      </main>
    </div>

    <script src="./node_modules/d3/dist/d3.min.js?v=no-top"></script>
    <script src="./node_modules/dagre/dist/dagre.min.js?v=no-top"></script>
    <script src="./node_modules/elkjs/lib/elk.bundled.js?v=no-top"></script>
    <script src="./src-data/deepseek-v4.graph.js?v=no-top"></script>
    <script src="./app.js?v=no-top"></script>
  </body>
</html>
